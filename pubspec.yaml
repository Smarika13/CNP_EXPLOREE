name: cnp_navigator
description: Combined Activity Booking and Admin Control System for Chitwan National Park

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # --- Common & Utilities ---
  intl: ^0.19.0           # Balanced version for compatibility
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.0    # Essential for admin email replies & maps
  
  # --- Firebase (Core Backend) ---
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0

  # --- State Management & Logic ---
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  get_it: ^7.6.4
  dartz: ^0.10.1
  flutter_dotenv: ^5.1.0

  # --- Friend's Unique Features ---
  audioplayers: ^6.5.1    # Required for the birdsounds
  
  # --- Your Unique Features ---
  image_picker: ^1.2.1    # For uploading profile/activity photos
  cached_network_image: 3.3.1
  http: ^1.6.0
  flutter_markdown_plus: ^1.0.7
  animated_text_kit: ^4.3.0
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0 
    # Updated to modern linting standards

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/music/       # Added from friend's project for birdsounds